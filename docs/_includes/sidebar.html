<aside class="sidebar">
  <a class="sidebar-brand" href="{{ '/' | relative_url }}">
    <span class="sidebar-logo">PO</span>
    <span>
      <strong>PyOrchestrator</strong>
      <small>SCADA / CMS</small>
    </span>
  </a>

  <nav class="sidebar-nav">
    {% for item in site.nav %}
      {% assign item_url = item.url | relative_url %}
      {% assign page_url = page.url | relative_url %}
      <a href="{{ item_url }}" class="nav-link{% if page_url == item_url %} active{% endif %}">
        {{ item.title }}
      </a>
    {% endfor %}
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-resources-title">Ресурсы</div>
    <a href="{{ '/' | relative_url }}">Документация</a>
    <a href="https://github.com/{{ site.github_org }}/{{ site.github_repo }}" target="_blank" rel="noopener">GitHub</a>
    <a href="https://github.com/{{ site.github_org }}/{{ site.github_repo }}/issues" target="_blank" rel="noopener">Issues</a>
  </div>
</aside>
