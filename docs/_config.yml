title: PyOrchestrator
description: SCADA/CMS платформа для изолированных Python-скриптов и ботов в Docker Compose
url: https://developer-ru.github.io
baseurl: /pyorchestrator
repository: Developer-RU/pyorchestrator

markdown: GFM
permalink: pretty
lang: ru

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-redirect-from

relative_links:
  enabled: true
  collections: true

exclude:
  - Gemfile
  - Gemfile.lock
  - roadmap-status.md

nav:
