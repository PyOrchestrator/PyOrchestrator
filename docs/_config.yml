title: PyOrchestrator
description: SCADA/CMS platform for isolated Python scripts and bots in Docker Compose
url: https://pyorchestrator.github.io
baseurl: /PyOrchestrator
repository: PyOrchestrator/PyOrchestrator

markdown: GFM
permalink: pretty
lang: en

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-redirect-from

relative_links:
  enabled: true
  collections: true

exclude:
  - Gemfile
  - Gemfile.lock
  - en/roadmap-status.md
  - ru/roadmap-status.md

defaults:
  - scope:
      path: "en"
      type: "pages"
    values:
      lang: en
  - scope:
      path: "ru"
      type: "pages"
    values:
      lang: ru

github_org: PyOrchestrator
github_repo: PyOrchestrator
