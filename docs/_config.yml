    url: /
  - title: Быстрый старт
    url: /getting-started/
  - title: Архитектура
    url: /architecture/
  - title: Control Plane UI
    url: /control-plane/
  - title: Runtime & Sandbox
    url: /runtime/
  - title: MCP для AI-агентов
    url: /mcp/
  - title: Схема данных
    url: /database-schema/
  - title: API
    url: /api-reference/
  - title: Развёртывание
    url: /deployment/
  - title: Конфигурация
    url: /configuration/
  - title: Безопасность
    url: /security/
  - title: Roadmap
    url: /roadmap/
  - title: Устранение неполадок
    url: /troubleshooting/

github_org: Developer-RU
github_repo: pyorchestrator
